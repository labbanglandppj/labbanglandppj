<h1 class="page-title">DATA ALAT</h1>

<!-- 🔥 TOMBOL TAMBAH (HANYA ADMIN) -->
<div id="adminActions" style="margin-bottom:15px; display:none;">
  <button onclick="openTambahModal()" style="padding:10px 15px; font-size:14px;">
    ➕ Tambah Alat
  </button>
</div>

<!-- 🔥 SEARCH & FILTER -->
<div class="alat-toolbar">

  <!-- SEARCH -->
  <input
    type="text"
    id="searchInput"
    class="search-box"
    placeholder="🔍 Cari nama alat..."
    onkeyup="filterDataAlat()"
  >

  <!-- FILTER KONDISI -->
  <select
    id="filterKondisi"
    class="filter-box"
    onchange="filterDataAlat()"
  >
    <option value="">Semua Kondisi</option>
    <option value="Layak">Layak</option>
    <option value="Perbaiki">Perbaiki</option>
    <option value="Rusak">Rusak</option>
  </select>

  <!-- FILTER STATUS -->
  <select
    id="filterStatus"
    class="filter-box"
    onchange="filterDataAlat()"
  >
    <option value="">Semua Status</option>
    <option value="Tersedia">Tersedia</option>
    <option value="Dipakai">Dipakai</option>
  </select>

</div>

<div class="table-container">

  <table>
    <thead>
      <tr>
        <th>No</th>
        <th>Nama Alat</th>
        <th>Jumlah Alat</th>
        <th>Kondisi Alat</th>
        <th>Status Alat</th>
        <th>Lokasi Alat</th>
        <th>Foto</th>
        <th>Aksi</th>
      </tr>
    </thead>

    <tbody id="tableBody">
      <!-- DATA DARI API -->
    </tbody>

  </table>

</div>
