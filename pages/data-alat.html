<h1 class="page-title">DATA ALAT</h1>

<!-- 🔥 TOMBOL TAMBAH (HANYA ADMIN) -->
<div id="adminActions" style="margin-bottom:15px; display:none;">
  <button onclick="openTambahModal()" style="padding:10px 15px; font-size:14px;">
    ➕ Tambah Alat
  </button>
</div>

<!-- 🔍 SEARCH DATA ALAT -->
<div class="search-container">

  <div class="search-box">

    <span class="search-icon">🔍</span>

    <input
      type="text"
      id="searchInput"
      placeholder="Cari nama alat..."
      onkeyup="searchDataAlat()"
    >

  </div>

</div>

<div class="table-container">

  <table class="data-alat-table">
    <thead>
      <tr>
        <th>No</th>
        <th>Nama Alat</th>
        <th>Jumlah Alat</th>
        <th>Kondisi Alat</th>
        <th>Status Alat</th>
        <th>Lokasi Alat</th>
        <th>Foto</th>
        <th>Aksi</th>
      </tr>
    </thead>

    <tbody id="tableBody">
      <!-- DATA DARI API -->
    </tbody>

  </table>

</div>
