<div class="cek-alat-page page-transition">

  <h1 class="page-title">
    CEK ALAT
  </h1>

  <!-- 🔍 SEARCH -->
  <div class="search-container">

    <div class="search-box">

      <input
        type="text"
        id="cekAlatSearch"
        placeholder="Cari nama alat..."
        onkeyup="renderCekAlat()"
      >

    </div>

  </div>

  <!-- 🔥 WRAPPER TABLE -->
  <div class="cek-alat-wrapper medium cek-alat-scroll">

    <table class="cek-alat-table">

      <thead>

        <tr>

          <th class="col-no">
            No
          </th>

          <th class="col-nama">
            Nama Alat
          </th>

          <th class="col-aksi">
            Aksi
          </th>

        </tr>

      </thead>

      <tbody id="cekAlatTableBody">

        <!-- RENDER DARI JS -->

      </tbody>

    </table>

  </div>

  </div>
